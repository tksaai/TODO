<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f6f8f7">
    <title>Task Muse</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Task Muse</p>
          <h1>今日のタスク</h1>
        </div>
        <div class="top-actions">
          <button class="ghost-button" id="exportButton" type="button" aria-label="タスクを書き出す">書き出し</button>
          <button class="ghost-button danger" id="clearDoneButton" type="button" aria-label="完了済みを削除">完了を整理</button>
        </div>
      </header>

      <main class="layout">
        <section class="workbench" aria-label="タスク管理">
          <form class="task-form" id="taskForm">
            <div class="field title-field">
              <label for="taskTitle">タスク</label>
              <input id="taskTitle" name="title" type="text" maxlength="80" placeholder="例: 企画書の初稿を作る" required>
            </div>
            <div class="field">
              <label for="taskDue">期限</label>
              <input id="taskDue" name="due" type="date">
            </div>
            <div class="field">
              <label for="taskPriority">優先度</label>
              <select id="taskPriority" name="priority">
                <option value="normal">通常</option>
                <option value="high">高め</option>
                <option value="low">低め</option>
              </select>
            </div>
            <button class="primary-button" type="submit" aria-label="タスクを追加">追加</button>
            <div class="field note-field">
              <label for="taskNote">メモ</label>
              <textarea id="taskNote" name="note" rows="2" maxlength="180" placeholder="補足があれば入力"></textarea>
            </div>
          </form>

          <div class="toolbar" aria-label="タスク表示">
            <div class="segments" role="tablist" aria-label="フィルター">
              <button class="segment is-active" type="button" data-filter="active" role="tab" aria-selected="true">未完了</button>
              <button class="segment" type="button" data-filter="all" role="tab" aria-selected="false">すべて</button>
              <button class="segment" type="button" data-filter="done" role="tab" aria-selected="false">達成済み</button>
            </div>
            <label class="search-box">
              <span>検索</span>
              <input id="searchInput" type="search" maxlength="60" placeholder="タイトルやメモ">
            </label>
          </div>

          <section class="stats-strip" aria-label="進捗">
            <div>
              <span id="activeCount">0</span>
              <small>未完了</small>
            </div>
            <div>
              <span id="doneCount">0</span>
              <small>達成</small>
            </div>
            <div>
              <span id="todayCount">0</span>
              <small>今日の達成</small>
            </div>
          </section>

          <ul class="task-list" id="taskList" aria-label="タスクリスト"></ul>
          <div class="empty-state" id="emptyState">
            <strong>タスクはありません</strong>
            <span>ひとつ追加すると、ここに並びます。</span>
          </div>
        </section>

        <aside class="companion-panel" aria-label="応援キャラクター">
          <div class="portrait-shell">
            <img src="assets/mascot.png" alt="応援キャラクターのミラ" class="portrait" id="mascotImage">
            <div class="pulse-ring" aria-hidden="true"></div>
          </div>

          <section class="speech-area" aria-live="polite">
            <div class="name-row">
              <span class="avatar-dot"></span>
              <strong>ミラ</strong>
              <span class="voice-state" id="voiceState">待機中</span>
            </div>
            <p class="speech" id="speechText">タスクを達成したら、ここで褒めます。</p>
            <div class="speech-actions">
              <button class="icon-button" id="replayButton" type="button" aria-label="もう一度読み上げ">再生</button>
              <button class="icon-button" id="surpriseButton" type="button" aria-label="励ましを表示">励まし</button>
            </div>
          </section>

          <section class="settings-panel" aria-label="音声とLLM">
            <div class="settings-row">
              <div>
                <strong>音声</strong>
                <small>Web Speech</small>
              </div>
              <label class="switch">
                <input id="voiceEnabled" type="checkbox" checked>
                <span></span>
              </label>
            </div>
            <label class="compact-field">
              <span>エンジン</span>
              <select id="voiceEngine">
                <option value="webspeech">Web Speech</option>
                <option value="voicevox">VOICEVOX</option>
              </select>
            </label>
            <label class="compact-field">
              <span>声</span>
              <select id="voiceSelect"></select>
            </label>
            <label class="compact-field">
              <span>VOICEVOX URL</span>
              <input id="voicevoxEndpoint" type="url" value="http://127.0.0.1:50021" placeholder="https://your-ddns.example.com/voicevox" spellcheck="false">
            </label>
            <label class="compact-field">
              <span>VOICEVOX話者</span>
              <select id="voicevoxSpeaker"></select>
            </label>
            <label class="compact-field">
              <span>VOICEVOXキー</span>
              <input id="voicevoxApiKey" type="password" autocomplete="off" spellcheck="false">
            </label>
            <div class="llm-actions">
              <button class="ghost-button" id="loadVoicevoxButton" type="button">話者取得</button>
              <code>127.0.0.1:50021</code>
            </div>
            <div class="range-grid">
              <label>
                <span>速さ</span>
                <input id="voiceRate" type="range" min="0.75" max="1.25" step="0.05" value="1">
              </label>
              <label>
                <span>高さ</span>
                <input id="voicePitch" type="range" min="0.8" max="1.35" step="0.05" value="1.08">
              </label>
            </div>

            <div class="settings-row llm-row">
              <div>
                <strong>無料LLM</strong>
                <small id="llmStatus">テンプレート</small>
              </div>
              <label class="switch">
                <input id="llmEnabled" type="checkbox">
                <span></span>
              </label>
            </div>
            <label class="compact-field">
              <span>URL</span>
              <input id="llmEndpoint" type="url" value="" placeholder="https://your-ddns.example.com" spellcheck="false">
            </label>
            <label class="compact-field">
              <span>モデル</span>
              <input id="llmModel" type="text" value="qwen2.5:0.5b" spellcheck="false">
            </label>
            <label class="compact-field">
              <span>APIキー</span>
              <input id="llmApiKey" type="password" autocomplete="off" spellcheck="false">
            </label>
            <div class="llm-actions">
              <button class="ghost-button" id="testLlmButton" type="button">接続確認</button>
              <code>ollama pull qwen2.5:0.5b</code>
            </div>
          </section>
        </aside>
      </main>

      <div class="mobile-praise" id="mobilePraise" aria-live="polite">
        <div>
          <strong>ミラ</strong>
          <p id="mobilePraiseText">タスクを達成したら、ここで褒めます。</p>
        </div>
        <button class="icon-button" id="mobileReplayButton" type="button" aria-label="もう一度読み上げ">再生</button>
      </div>
    </div>

    <template id="taskTemplate">
      <li class="task-card">
        <button class="check-button" type="button" aria-label="完了を切り替え"></button>
        <div class="task-body">
          <div class="task-main">
            <strong class="task-title"></strong>
            <span class="priority-badge"></span>
          </div>
          <p class="task-note"></p>
          <div class="task-meta"></div>
        </div>
        <button class="delete-button" type="button" aria-label="タスクを削除">削除</button>
      </li>
    </template>

    <script src="config.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
